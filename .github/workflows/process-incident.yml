name: Procesar Incidente

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  register-incident:
    name: Registrar incidente
    if: |
      github.event_name == 'issues' &&
      (github.event.action == 'opened' || github.event.action == 'labeled') &&
      contains(github.event.issue.labels.*.name, 'incident')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parsear formulario del issue
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/incident-report.yml

      - name: Procesar y guardar incidente
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const parsed = JSON.parse(process.env.PARSED);

            // --- Validar fecha_inicio ---
            const fechaInicioRaw = (parsed.fecha_inicio || '').trim();
            const dateRegex = /^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}$/;
            if (!dateRegex.test(fechaInicioRaw)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Error de validación:** El campo \`fecha_inicio\` no tiene el formato correcto.\n\nFormato esperado: \`YYYY-MM-DD HH:MM\`\nValor recibido: \`${fechaInicioRaw}\``
              });
              core.setFailed('fecha_inicio inválida');
              return;
            }

            const fechaInicio = new Date(fechaInicioRaw.replace(' ', 'T') + ':00');
            if (isNaN(fechaInicio.getTime())) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Error de validación:** La fecha \`${fechaInicioRaw}\` no es una fecha válida.`
              });
              core.setFailed('fecha_inicio inválida');
              return;
            }

            // --- Leer incidentes existentes ---
            let incidents = [];
            const filePath = 'data/incidents.json';
            try {
              const content = fs.readFileSync(filePath, 'utf8');
              incidents = JSON.parse(content);
            } catch (e) {
              incidents = [];
            }

            // --- Verificar duplicado ---
            const exists = incidents.find(i => i.id === context.issue.number);
            if (exists) {
              core.info(`Incidente #${context.issue.number} ya registrado, omitiendo.`);
              return;
            }

            // --- Procesar fecha_solucion y MTTR ---
            const fechaSolucionRaw = (parsed.fecha_solucion || '').trim();
            let fechaSolucion = null;
            let mttrMinutes = null;
            let mttrHours = null;
            let estado = 'abierto';

            if (fechaSolucionRaw && dateRegex.test(fechaSolucionRaw)) {
              fechaSolucion = new Date(fechaSolucionRaw.replace(' ', 'T') + ':00');
              if (!isNaN(fechaSolucion.getTime()) && fechaSolucion > fechaInicio) {
                mttrMinutes = Math.round((fechaSolucion - fechaInicio) / 60000);
                mttrHours = parseFloat((mttrMinutes / 60).toFixed(2));
                estado = 'resuelto';
              } else {
                fechaSolucion = null;
              }
            }

            // --- Construir registro ---
            const incident = {
              id: context.issue.number,
              title: context.issue.title,
              fecha_inicio: fechaInicio.toISOString().replace('Z', '').split('.')[0],
              fecha_solucion: fechaSolucion ? fechaSolucion.toISOString().replace('Z', '').split('.')[0] : null,
              mttr_minutes: mttrMinutes,
              mttr_hours: mttrHours,
              tipo_error: parsed.tipo_error || 'No especificado',
              severidad: parsed.severidad || 'No especificada',
              solicitante: parsed.solicitante || context.actor,
              servicio_afectado: parsed.servicio_afectado || 'No especificado',
              estado: estado,
              created_at: context.issue.created_at,
              issue_url: context.issue.html_url
            };

            incidents.push(incident);
            fs.writeFileSync(filePath, JSON.stringify(incidents, null, 2) + '\n');

            // --- Etiquetar issue ---
            const severidadLabel = (parsed.severidad || '').split(' - ')[0].trim().toLowerCase();
            const labelsToAdd = [];
            if (severidadLabel) labelsToAdd.push(severidadLabel);
            labelsToAdd.push(estado === 'resuelto' ? 'resolved' : 'open');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd
            });

            // --- Cerrar issue si está resuelto ---
            if (estado === 'resuelto') {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed'
              });
            }

            // --- Comentar resumen ---
            const resueltos = incidents.filter(i => i.estado === 'resuelto');
            const avgMttr = resueltos.length > 0
              ? (resueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / resueltos.length).toFixed(1)
              : 'N/A';

            let summaryTable = '| # | Título | Severidad | Estado | MTTR (min) |\n';
            summaryTable += '|---|--------|-----------|--------|------------|\n';
            for (const inc of incidents.slice(-10)) {
              summaryTable += `| [#${inc.id}](${inc.issue_url}) | ${inc.title} | ${inc.severidad} | ${inc.estado} | ${inc.mttr_minutes ?? '⏳'} |\n`;
            }

            const commentBody = `## 📋 Incidente registrado

            **ID:** #${incident.id}
            **Severidad:** ${incident.severidad}
            **Tipo:** ${incident.tipo_error}
            **Servicio afectado:** ${incident.servicio_afectado}
            **Estado:** ${incident.estado}
            ${incident.mttr_minutes ? `**MTTR:** ${incident.mttr_minutes} minutos (${incident.mttr_hours} horas)` : '**MTTR:** ⏳ Pendiente de resolución'}

            ---

            ### 📊 Resumen de incidentes (últimos 10)
            ${summaryTable}

            **MTTR promedio (resueltos):** ${avgMttr} minutos
            **Total incidentes:** ${incidents.length} | **Resueltos:** ${resueltos.length} | **Abiertos:** ${incidents.length - resueltos.length}

            ${estado !== 'resuelto' ? '> 💡 Para resolver este incidente, comenta: `/resolver YYYY-MM-DD HH:MM`' : '> ✅ Este incidente fue registrado como resuelto.'}`.replace(/^            /gm, '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            // Exportar para commit
            core.exportVariable('INCIDENT_PROCESSED', 'true');
        env:
          PARSED: ${{ steps.parse.outputs.jsonString }}

      - name: Commit cambios
        if: env.INCIDENT_PROCESSED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json
          git diff --cached --quiet || git commit -m "📝 Registrar incidente #${{ github.event.issue.number }}"
          git push

  resolve-incident:
    name: Resolver incidente via comando
    if: |
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      contains(github.event.issue.labels.*.name, 'incident') &&
      startsWith(github.event.comment.body, '/resolver')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolver incidente
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commentBody = context.payload.comment.body.trim();

            // --- Parsear comando ---
            const match = commentBody.match(/^\/resolver\s+(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})$/);
            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ **Formato inválido.** Usa: `/resolver YYYY-MM-DD HH:MM`\n\nEjemplo: `/resolver 2026-04-08 11:45`'
              });
              core.setFailed('Comando inválido');
              return;
            }

            const fechaSolucionRaw = match[1];
            const fechaSolucion = new Date(fechaSolucionRaw.replace(' ', 'T') + ':00');
            if (isNaN(fechaSolucion.getTime())) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Fecha inválida:** \`${fechaSolucionRaw}\``
              });
              core.setFailed('Fecha inválida');
              return;
            }

            // --- Leer incidentes ---
            const filePath = 'data/incidents.json';
            let incidents = [];
            try {
              incidents = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ No se encontró el archivo de incidentes.'
              });
              core.setFailed('Archivo no encontrado');
              return;
            }

            // --- Buscar incidente ---
            const idx = incidents.findIndex(i => i.id === context.issue.number);
            if (idx === -1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ No se encontró el incidente #${context.issue.number} en el registro.`
              });
              core.setFailed('Incidente no encontrado');
              return;
            }

            const incident = incidents[idx];
            if (incident.estado === 'resuelto') {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `ℹ️ Este incidente ya fue marcado como resuelto el ${incident.fecha_solucion}.`
              });
              return;
            }

            // --- Calcular MTTR ---
            const fechaInicio = new Date(incident.fecha_inicio);
            if (fechaSolucion <= fechaInicio) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ La fecha de solución (\`${fechaSolucionRaw}\`) debe ser posterior a la fecha de inicio (\`${incident.fecha_inicio}\`).`
              });
              core.setFailed('Fecha de solución anterior a fecha de inicio');
              return;
            }

            const mttrMinutes = Math.round((fechaSolucion - fechaInicio) / 60000);
            const mttrHours = parseFloat((mttrMinutes / 60).toFixed(2));

            // --- Actualizar incidente ---
            incidents[idx].fecha_solucion = fechaSolucion.toISOString().replace('Z', '').split('.')[0];
            incidents[idx].mttr_minutes = mttrMinutes;
            incidents[idx].mttr_hours = mttrHours;
            incidents[idx].estado = 'resuelto';

            fs.writeFileSync(filePath, JSON.stringify(incidents, null, 2) + '\n');

            // --- Actualizar labels ---
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'open'
              });
            } catch (e) { /* label may not exist */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['resolved']
            });

            // --- Cerrar issue ---
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

            // --- Comentar resumen ---
            const resueltos = incidents.filter(i => i.estado === 'resuelto');
            const avgMttr = resueltos.length > 0
              ? (resueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / resueltos.length).toFixed(1)
              : 'N/A';

            const commentBody = `## ✅ Incidente resuelto

            **ID:** #${incident.id}
            **Fecha de inicio:** ${incident.fecha_inicio}
            **Fecha de solución:** ${incidents[idx].fecha_solucion}
            **MTTR:** ${mttrMinutes} minutos (${mttrHours} horas)
            **Severidad:** ${incident.severidad}
            **Servicio afectado:** ${incident.servicio_afectado}

            ---

            ### 📊 Métricas DORA — MTTR
            | Métrica | Valor |
            |---------|-------|
            | MTTR este incidente | ${mttrMinutes} min (${mttrHours} h) |
            | MTTR promedio global | ${avgMttr} min |
            | Total incidentes resueltos | ${resueltos.length} |
            | Total incidentes abiertos | ${incidents.length - resueltos.length} |`.replace(/^            /gm, '');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });

            core.exportVariable('INCIDENT_RESOLVED', 'true');

      - name: Commit cambios
        if: env.INCIDENT_RESOLVED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json
          git diff --cached --quiet || git commit -m "✅ Resolver incidente #${{ github.event.issue.number }}"
          git push
