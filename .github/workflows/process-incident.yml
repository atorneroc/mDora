name: Procesar Incidente

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

concurrency:
  group: incident-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Registrar incidente al abrir el issue
  # ──────────────────────────────────────────────
  register-incident:
    name: Registrar incidente
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'opened' &&
      (contains(github.event.issue.labels.*.name, 'incident') ||
      startsWith(github.event.issue.title, '[INCIDENTE]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parsear formulario del issue
        id: parse
        uses: issue-ops/parser@v4.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: incident-report.yml

      - name: Validar campos del formulario
        id: validate
        uses: issue-ops/validator@v4.0.0
        with:
          issue-form-template: incident-report.yml
          parsed-issue-body: ${{ steps.parse.outputs.json }}
          workspace: ${{ github.workspace }}
          add-comment: true

      - name: Detener si validación falla
        if: steps.validate.outputs.result == 'failure'
        run: |
          echo "::error::Validación del formulario falló: ${{ steps.validate.outputs.errors }}"
          exit 1

      - name: Procesar y guardar incidente
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const parsed = JSON.parse(process.env.PARSED);
            const issue = context.payload.issue;

            // --- Validar fecha_inicio ---
            const fechaInicioRaw = (parsed.fecha_inicio || '').trim();
            const dateRegex = /^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}$/;
            if (!dateRegex.test(fechaInicioRaw)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '❌ **Error de validación:** El campo `fecha_inicio` no tiene el formato correcto.',
                  '',
                  `Formato esperado: \`YYYY-MM-DD HH:MM\``,
                  `Valor recibido: \`${fechaInicioRaw || '(vacío)'}\``,
                  '',
                  '> 💡 Para corregir la fecha de inicio, comenta: `/fecha_inicio YYYY-MM-DD HH:MM`'
                ].join('\n')
              });
              core.setFailed('fecha_inicio inválida');
              return;
            }

            const fechaInicio = new Date(fechaInicioRaw.replace(' ', 'T') + ':00');
            if (isNaN(fechaInicio.getTime())) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  `❌ **Error de validación:** La fecha \`${fechaInicioRaw}\` no es una fecha válida.`,
                  '',
                  '> 💡 Para corregir la fecha de inicio, comenta: `/fecha_inicio YYYY-MM-DD HH:MM`'
                ].join('\n')
              });
              core.setFailed('fecha_inicio inválida');
              return;
            }

            // --- Leer incidentes existentes ---
            let incidents = [];
            const filePath = 'data/incidents.json';
            try {
              incidents = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            } catch (e) {
              incidents = [];
            }

            // --- Inmutabilidad: si ya existe, no re-registrar ---
            if (incidents.find(i => i.id === context.issue.number)) {
              core.info(`Incidente #${context.issue.number} ya registrado, omitiendo.`);
              return;
            }

            // --- Construir registro ---
            const tipoError = Array.isArray(parsed.tipo_error) ? parsed.tipo_error[0] : (parsed.tipo_error || 'No especificado');
            const servicioAfectado = Array.isArray(parsed.servicio_afectado) ? parsed.servicio_afectado[0] : (parsed.servicio_afectado || 'No especificado');
            const incident = {
              id: context.issue.number,
              title: issue.title,
              fecha_inicio: fechaInicio.toISOString().replace('Z', '').split('.')[0],
              fecha_solucion: null,
              mttr_minutes: null,
              mttr_hours: null,
              tipo_error: tipoError,
              solicitante: parsed.solicitante || context.actor,
              servicio_afectado: servicioAfectado,
              estado: 'abierto',
              created_at: issue.created_at,
              issue_url: issue.html_url
            };

            incidents.push(incident);
            fs.writeFileSync(filePath, JSON.stringify(incidents, null, 2) + '\n');

            // --- Etiquetar issue ---
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['incident', 'open']
            });

            // --- Comentar resumen (filtrado por servicio afectado) ---
            const servicioIncidents = incidents.filter(i => i.servicio_afectado === servicioAfectado);
            const servicioResueltos = servicioIncidents.filter(i => i.estado === 'resuelto');
            const avgMttr = servicioResueltos.length > 0
              ? (servicioResueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / servicioResueltos.length).toFixed(1)
              : 'N/A';

            let table = '| # | Título | Estado | MTTR (min) |\n';
            table += '|---|--------|--------|------------|\n';
            for (const inc of servicioIncidents.slice(-10)) {
              table += `| [#${inc.id}](${inc.issue_url}) | ${inc.title} | ${inc.estado} | ${inc.mttr_minutes ?? '⏳'} |\n`;
            }

            const body = [
              '## 📋 Incidente registrado',
              '',
              `**ID:** #${incident.id}`,
              `**Tipo:** ${incident.tipo_error}`,
              `**Servicio afectado:** ${incident.servicio_afectado}`,
              '**Estado:** abierto',
              '**MTTR:** ⏳ Pendiente de resolución',
              '',
              '---',
              '',
              `### 📊 Resumen de incidentes (últimos 10) — ${servicioAfectado}`,
              table,
              `**MTTR promedio (resueltos):** ${avgMttr} minutos`,
              `**Incidentes ${servicioAfectado}:** ${servicioIncidents.length} | **Resueltos:** ${servicioResueltos.length} | **Abiertos:** ${servicioIncidents.length - servicioResueltos.length}`,
              '',
              '> 💡 Para resolver este incidente, comenta: `/fecha_fin YYYY-MM-DD HH:MM`'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            core.exportVariable('INCIDENT_PROCESSED', 'true');
        env:
          PARSED: ${{ steps.parse.outputs.json }}

      - name: Commit cambios
        if: env.INCIDENT_PROCESSED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json
          git diff --cached --quiet || git commit -m "📝 Registrar incidente #${{ github.event.issue.number }}"
          git push

  # ──────────────────────────────────────────────────────
  # JOB 2: Corregir fecha de inicio via /fecha_inicio
  # ──────────────────────────────────────────────────────
  fix-fecha-inicio:
    name: Corregir fecha de inicio
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      contains(github.event.comment.body, '/fecha_inicio') &&
      (contains(github.event.issue.labels.*.name, 'incident') ||
      startsWith(github.event.issue.title, '[INCIDENTE]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Parsear formulario del issue
        id: parse
        uses: issue-ops/parser@v4.0.0
        with:
          body: ${{ github.event.issue.body }}
          issue-form-template: incident-report.yml

      - name: Registrar con fecha corregida
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const parsed = JSON.parse(process.env.PARSED);
            const issue = context.payload.issue;
            const commentText = context.payload.comment.body.trim();

            // --- Parsear comando ---
            const match = commentText.match(/^\/fecha_inicio\s+(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})$/);
            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ **Formato inválido.** Usa: `/fecha_inicio YYYY-MM-DD HH:MM`\n\nEjemplo: `/fecha_inicio 2026-04-08 09:30`'
              });
              core.setFailed('Comando inválido');
              return;
            }

            const fechaInicioRaw = match[1];
            const fechaInicio = new Date(fechaInicioRaw.replace(' ', 'T') + ':00');
            if (isNaN(fechaInicio.getTime())) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Fecha inválida:** \`${fechaInicioRaw}\``
              });
              core.setFailed('Fecha inválida');
              return;
            }

            // --- Leer incidentes ---
            const filePath = 'data/incidents.json';
            let incidents = [];
            try {
              incidents = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            } catch (e) {
              incidents = [];
            }

            // --- Verificar si ya existe el incidente ---
            const existingIdx = incidents.findIndex(i => i.id === context.issue.number);
            const tipoError = Array.isArray(parsed.tipo_error) ? parsed.tipo_error[0] : (parsed.tipo_error || 'No especificado');
            const servicioAfectado = Array.isArray(parsed.servicio_afectado) ? parsed.servicio_afectado[0] : (parsed.servicio_afectado || 'No especificado');
            let incident;
            let wasUpdate = false;

            if (existingIdx !== -1) {
              // --- Actualizar fecha_inicio en incidente existente ---
              incident = incidents[existingIdx];

              // Validar contra fecha_fin existente si hay una
              if (incident.fecha_solucion) {
                const fechaFin = new Date(incident.fecha_solucion);
                if (fechaInicio >= fechaFin) {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.issue.number,
                    body: `❌ La nueva fecha de inicio (\`${fechaInicioRaw}\`) debe ser **anterior** a la fecha de solución actual (\`${incident.fecha_solucion}\`).`
                  });
                  core.setFailed('fecha_inicio posterior a fecha_solucion');
                  return;
                }
                // Recalcular MTTR
                const mttrMinutes = Math.round((fechaFin - fechaInicio) / 60000);
                const mttrHours = parseFloat((mttrMinutes / 60).toFixed(2));
                incident.mttr_minutes = mttrMinutes;
                incident.mttr_hours = mttrHours;
              }

              incident.fecha_inicio = fechaInicio.toISOString().replace('Z', '').split('.')[0];
              incidents[existingIdx] = incident;
              wasUpdate = true;
            } else {
              // --- Registrar incidente nuevo con fecha corregida ---
              incident = {
                id: context.issue.number,
                title: issue.title,
                fecha_inicio: fechaInicio.toISOString().replace('Z', '').split('.')[0],
                fecha_solucion: null,
                mttr_minutes: null,
                mttr_hours: null,
                tipo_error: tipoError,
                solicitante: parsed.solicitante || context.actor,
                servicio_afectado: servicioAfectado,
                estado: 'abierto',
                created_at: issue.created_at,
                issue_url: issue.html_url
              };
              incidents.push(incident);
            }

            fs.writeFileSync(filePath, JSON.stringify(incidents, null, 2) + '\n');

            // --- Etiquetar ---
            const labelsToAdd = ['incident'];
            labelsToAdd.push(incident.estado === 'resuelto' ? 'resolved' : 'open');

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labelsToAdd
            });

            // --- Comentar resumen (filtrado por servicio afectado) ---
            const servicioIncidents = incidents.filter(i => i.servicio_afectado === servicioAfectado);
            const servicioResueltos = servicioIncidents.filter(i => i.estado === 'resuelto');
            const avgMttr = servicioResueltos.length > 0
              ? (servicioResueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / servicioResueltos.length).toFixed(1)
              : 'N/A';

            let table = '| # | Título | Estado | MTTR (min) |\n';
            table += '|---|--------|--------|------------|\n';
            for (const inc of servicioIncidents.slice(-10)) {
              table += `| [#${inc.id}](${inc.issue_url}) | ${inc.title} | ${inc.estado} | ${inc.mttr_minutes ?? '⏳'} |\n`;
            }

            const headerMsg = wasUpdate
              ? '## 🔄 Fecha de inicio actualizada'
              : '## 📋 Incidente registrado (fecha de inicio corregida)';

            const mttrMsg = incident.mttr_minutes
              ? `**MTTR:** ${incident.mttr_minutes} minutos (${incident.mttr_hours} horas) *(recalculado)*`
              : '**MTTR:** ⏳ Pendiente de resolución';

            const body = [
              headerMsg,
              '',
              `**ID:** #${incident.id}`,
              `**Fecha de inicio:** ${incident.fecha_inicio}`,
              incident.fecha_solucion ? `**Fecha de solución:** ${incident.fecha_solucion}` : null,
              `**Tipo:** ${incident.tipo_error}`,
              `**Servicio afectado:** ${incident.servicio_afectado}`,
              `**Estado:** ${incident.estado}`,
              mttrMsg,
              '',
              '---',
              '',
              `### 📊 Resumen de incidentes (últimos 10) — ${servicioAfectado}`,
              table,
              `**MTTR promedio (resueltos):** ${avgMttr} minutos`,
              `**Incidentes ${servicioAfectado}:** ${servicioIncidents.length} | **Resueltos:** ${servicioResueltos.length} | **Abiertos:** ${servicioIncidents.length - servicioResueltos.length}`,
              '',
              incident.estado !== 'resuelto'
                ? '> 💡 Para resolver este incidente, comenta: `/fecha_fin YYYY-MM-DD HH:MM`'
                : '> ✅ Este incidente está resuelto. El MTTR fue recalculado.'
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            core.exportVariable('INCIDENT_PROCESSED', 'true');
        env:
          PARSED: ${{ steps.parse.outputs.json }}

      - name: Commit cambios
        if: env.INCIDENT_PROCESSED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json
          git diff --cached --quiet || git commit -m "📝 Registrar incidente #${{ github.event.issue.number }} (fecha corregida)"
          git push

  # ──────────────────────────────────────────────
  # JOB 3: Resolver incidente via /fecha_fin
  # ──────────────────────────────────────────────
  resolve-incident:
    name: Resolver incidente via comando
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      contains(github.event.comment.body, '/fecha_fin') &&
      (contains(github.event.issue.labels.*.name, 'incident') ||
      startsWith(github.event.issue.title, '[INCIDENTE]'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolver incidente
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const commandText = context.payload.comment.body.trim();

            // --- Parsear comando ---
            const match = commandText.match(/^\/fecha_fin\s+(\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2})$/);
            if (!match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ **Formato inválido.** Usa: `/fecha_fin YYYY-MM-DD HH:MM`\n\nEjemplo: `/fecha_fin 2026-04-08 11:45`'
              });
              core.setFailed('Comando inválido');
              return;
            }

            const fechaSolucionRaw = match[1];
            const fechaSolucion = new Date(fechaSolucionRaw.replace(' ', 'T') + ':00');
            if (isNaN(fechaSolucion.getTime())) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ **Fecha inválida:** \`${fechaSolucionRaw}\``
              });
              core.setFailed('Fecha inválida');
              return;
            }

            // --- Leer incidentes ---
            const filePath = 'data/incidents.json';
            let incidents = [];
            try {
              incidents = JSON.parse(fs.readFileSync(filePath, 'utf8'));
            } catch (e) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '❌ No se encontró el archivo de incidentes.'
              });
              core.setFailed('Archivo no encontrado');
              return;
            }

            // --- Buscar incidente ---
            const idx = incidents.findIndex(i => i.id === context.issue.number);
            if (idx === -1) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: [
                  '❌ No se encontró el incidente en el registro.',
                  '',
                  'Esto ocurre porque la **fecha de inicio** no fue válida al crear el issue.',
                  '',
                  '> 💡 Primero corrige la fecha de inicio comentando: `/fecha_inicio YYYY-MM-DD HH:MM`',
                  '> Luego podrás resolver con: `/fecha_fin YYYY-MM-DD HH:MM`'
                ].join('\n')
              });
              core.setFailed('Incidente no registrado — fecha_inicio pendiente');
              return;
            }

            const incident = incidents[idx];
            const wasAlreadyResolved = incident.estado === 'resuelto';

            // --- Validar fecha_solucion > fecha_inicio ---
            const fechaInicio = new Date(incident.fecha_inicio);
            if (fechaSolucion <= fechaInicio) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `❌ La fecha de solución (\`${fechaSolucionRaw}\`) debe ser **posterior** a la fecha de inicio (\`${incident.fecha_inicio}\`).`
              });
              core.setFailed('Fecha de solución anterior a fecha de inicio');
              return;
            }

            // --- Calcular MTTR ---
            const mttrMinutes = Math.round((fechaSolucion - fechaInicio) / 60000);
            const mttrHours = parseFloat((mttrMinutes / 60).toFixed(2));

            // --- Actualizar incidente ---
            incidents[idx].fecha_solucion = fechaSolucion.toISOString().replace('Z', '').split('.')[0];
            incidents[idx].mttr_minutes = mttrMinutes;
            incidents[idx].mttr_hours = mttrHours;
            incidents[idx].estado = 'resuelto';

            fs.writeFileSync(filePath, JSON.stringify(incidents, null, 2) + '\n');

            // --- Actualizar labels ---
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                name: 'open'
              });
            } catch (e) { /* label may not exist */ }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['resolved']
            });

            // --- Cerrar issue ---
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });

            // --- Métricas DORA filtradas por servicio afectado ---
            const servicioAfectado = incident.servicio_afectado;
            const servicioIncidents = incidents.filter(i => i.servicio_afectado === servicioAfectado);
            const servicioResueltos = servicioIncidents.filter(i => i.estado === 'resuelto');
            const avgMttrServicio = servicioResueltos.length > 0
              ? (servicioResueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / servicioResueltos.length).toFixed(1)
              : 'N/A';

            let tableServicio = '| # | Título | Estado | MTTR (min) |\n';
            tableServicio += '|---|--------|--------|------------|\n';
            for (const inc of servicioIncidents.slice(-10)) {
              tableServicio += `| [#${inc.id}](${inc.issue_url}) | ${inc.title} | ${inc.estado} | ${inc.mttr_minutes ?? '⏳'} |\n`;
            }

            // --- Resumen total (todos los servicios) ---
            const totalResueltos = incidents.filter(i => i.estado === 'resuelto');
            const totalAbiertos = incidents.filter(i => i.estado === 'abierto');
            const avgMttrTotal = totalResueltos.length > 0
              ? (totalResueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / totalResueltos.length).toFixed(1)
              : 'N/A';

            // Agrupar por servicio para tabla resumen
            const servicios = [...new Set(incidents.map(i => i.servicio_afectado))];
            let tableTotal = '| Servicio | Total | Resueltos | Abiertos | MTTR prom. (min) |\n';
            tableTotal += '|----------|-------|-----------|----------|------------------|\n';
            for (const svc of servicios) {
              const svcAll = incidents.filter(i => i.servicio_afectado === svc);
              const svcResueltos = svcAll.filter(i => i.estado === 'resuelto');
              const svcAbiertos = svcAll.filter(i => i.estado === 'abierto');
              const svcMttr = svcResueltos.length > 0
                ? (svcResueltos.reduce((sum, i) => sum + (i.mttr_minutes || 0), 0) / svcResueltos.length).toFixed(1)
                : 'N/A';
              tableTotal += `| ${svc} | ${svcAll.length} | ${svcResueltos.length} | ${svcAbiertos.length} | ${svcMttr} |\n`;
            }

            const body = [
              wasAlreadyResolved
                ? '## 🔄 Fecha de solución actualizada'
                : '## ✅ Incidente resuelto',
              '',
              `**ID:** #${incident.id}`,
              `**Fecha de inicio:** ${incident.fecha_inicio}`,
              `**Fecha de solución:** ${incidents[idx].fecha_solucion}`,
              `**MTTR:** ${mttrMinutes} minutos (${mttrHours} horas)`,
              `**Servicio afectado:** ${servicioAfectado}`,
              '',
              '---',
              '',
              `### 📊 Métricas DORA — MTTR — ${servicioAfectado}`,
              tableServicio,
              `**MTTR promedio ${servicioAfectado}:** ${avgMttrServicio} minutos`,
              `**Incidentes ${servicioAfectado}:** ${servicioIncidents.length} | **Resueltos:** ${servicioResueltos.length} | **Abiertos:** ${servicioIncidents.length - servicioResueltos.length}`,
              '',
              '---',
              '',
              '### 📋 Resumen general (todos los servicios)',
              tableTotal,
              `**Total global:** ${incidents.length} | **Resueltos:** ${totalResueltos.length} | **Abiertos:** ${totalAbiertos.length} | **MTTR promedio global:** ${avgMttrTotal} minutos`
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            core.exportVariable('INCIDENT_RESOLVED', 'true');

      - name: Commit cambios
        if: env.INCIDENT_RESOLVED == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/incidents.json
          git diff --cached --quiet || git commit -m "✅ Resolver incidente #${{ github.event.issue.number }}"
          git push
