name: Auditoría de fechas en incidentes

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit-dates:
    name: Revisar fechas con formato incorrecto
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Auditar issues abiertos con fechas inválidas
        id: audit
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const dateRegex = /^\d{4}-\d{2}-\d{2}\s+\d{2}:\d{2}$/;

            // --- Leer incidents.json para cruzar estado real ---
            let registeredIncidents = [];
            try {
              registeredIncidents = JSON.parse(fs.readFileSync('data/incidents.json', 'utf8'));
            } catch (e) {
              core.warning('No se pudo leer data/incidents.json: ' + e.message);
            }

            // --- Obtener issues abiertos con label incident ---
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'incident',
              state: 'open',
              per_page: 100
            });

            if (issues.length === 0) {
              core.info('No hay issues de incidentes abiertos.');
              await core.summary
                .addHeading('🔍 Auditoría de fechas en incidentes', 2)
                .addRaw('✅ No hay issues de incidentes abiertos.')
                .write();
              core.setOutput('csv', 'Issue,Titulo,URL,Campo,Problema,Valor\n');
              return;
            }

            const results = [];
            const okCount = { total: issues.length, withProblems: 0 };

            for (const issue of issues) {
              const body = issue.body || '';
              const issueProblems = [];

              // --- Buscar si el incidente ya fue registrado en el JSON ---
              const registered = registeredIncidents.find(i => i.id === issue.number);

              // ════════════════════════════════════════════════════
              // FECHA_INICIO: si ya está en JSON, la fecha fue validada
              // al registrarse → no reportar.  Solo revisar si NO existe.
              // ════════════════════════════════════════════════════
              if (!registered) {
                const inicioMatch = body.match(/###\s*Fecha y hora de inicio del incidente\s*\n\s*\n\s*(.+)/);
                const fechaInicioRaw = inicioMatch ? inicioMatch[1].trim() : '';

                if (!fechaInicioRaw || fechaInicioRaw === '_No response_') {
                  issueProblems.push({ field: 'fecha_inicio', problem: 'No proporcionada', value: '-' });
                } else if (!dateRegex.test(fechaInicioRaw)) {
                  issueProblems.push({ field: 'fecha_inicio', problem: 'Formato incorrecto', value: fechaInicioRaw });
                } else {
                  const d = new Date(fechaInicioRaw.replace(' ', 'T') + ':00');
                  if (isNaN(d.getTime())) {
                    issueProblems.push({ field: 'fecha_inicio', problem: 'Fecha inválida', value: fechaInicioRaw });
                  }
                }
              }

              // ════════════════════════════════════════════════════
              // FECHA_FIN: si está en JSON y resuelto, ya fue validada.
              // Si está en JSON pero abierto, revisar comentarios
              // para detectar intentos fallidos de /fecha_fin.
              // ════════════════════════════════════════════════════
              if (registered && registered.estado === 'abierto') {
                // Buscar el último comentario /fecha_fin de un usuario (no bot)
                const allComments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 100
                });

                // Filtrar comentarios de usuarios reales con /fecha_fin
                const fechaFinComments = allComments.filter(c =>
                  c.user.login !== 'github-actions[bot]' &&
                  c.body.trim().startsWith('/fecha_fin')
                );

                if (fechaFinComments.length > 0) {
                  // Tomar el último intento
                  const lastAttempt = fechaFinComments[fechaFinComments.length - 1];
                  const cmdText = lastAttempt.body.trim();
                  const fechaFinMatch = cmdText.match(/^\/fecha_fin\s+(\S.*)$/);

                  if (!fechaFinMatch) {
                    issueProblems.push({ field: 'fecha_fin', problem: 'Comando sin fecha', value: cmdText });
                  } else {
                    const rawVal = fechaFinMatch[1].trim();
                    if (!dateRegex.test(rawVal)) {
                      issueProblems.push({ field: 'fecha_fin', problem: 'Formato incorrecto', value: rawVal });
                    } else {
                      const d = new Date(rawVal.replace(' ', 'T') + ':00');
                      if (isNaN(d.getTime())) {
                        issueProblems.push({ field: 'fecha_fin', problem: 'Fecha inválida', value: rawVal });
                      } else {
                        // Fecha con formato válido pero ¿anterior a inicio?
                        const fechaInicio = new Date(registered.fecha_inicio);
                        if (d <= fechaInicio) {
                          issueProblems.push({
                            field: 'fecha_fin',
                            problem: 'Anterior o igual a fecha_inicio',
                            value: `${rawVal} (inicio: ${registered.fecha_inicio.replace('T', ' ').slice(0, 16)})`
                          });
                        }
                      }
                    }
                  }
                }
              }

              // También revisar fecha_solucion del body si NO está en JSON
              if (!registered) {
                const finMatch = body.match(/###\s*Fecha y hora de solución\s*\(opcional\)\s*\n\s*\n\s*(.+)/);
                const fechaFinRaw = finMatch ? finMatch[1].trim() : '';
                if (fechaFinRaw && fechaFinRaw !== '_No response_') {
                  if (!dateRegex.test(fechaFinRaw)) {
                    issueProblems.push({ field: 'fecha_fin', problem: 'Formato incorrecto (body)', value: fechaFinRaw });
                  } else {
                    const d = new Date(fechaFinRaw.replace(' ', 'T') + ':00');
                    if (isNaN(d.getTime())) {
                      issueProblems.push({ field: 'fecha_fin', problem: 'Fecha inválida (body)', value: fechaFinRaw });
                    }
                  }
                }
              }

              // --- Agregar resultados ---
              if (issueProblems.length > 0) {
                okCount.withProblems++;
                for (const p of issueProblems) {
                  results.push({
                    issue: issue.number,
                    title: issue.title.replace(/\|/g, '-'),
                    url: issue.html_url,
                    ...p
                  });
                }

                // --- Comentar en el issue (sin duplicar por día) ---
                const recentComments = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  per_page: 20
                });

                const today = new Date().toISOString().split('T')[0];
                const alreadyNotified = recentComments.data.some(c =>
                  c.user.login === 'github-actions[bot]' &&
                  c.body.includes('🔍 **Auditoría de fechas**') &&
                  c.created_at.startsWith(today)
                );

                if (!alreadyNotified) {
                  const bullets = issueProblems.map(p =>
                    `- **${p.field}:** ${p.problem}${p.value !== '-' ? ` → \`${p.value}\`` : ''}`
                  );
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issue.number,
                    body: [
                      '🔍 **Auditoría de fechas** — Se detectaron problemas en este incidente:',
                      '',
                      ...bullets,
                      '',
                      'Formato esperado: `YYYY-MM-DD HH:MM` (ejemplo: `2026-04-08 09:30`)',
                      '',
                      '> 💡 Para corregir la fecha de inicio: `/fecha_inicio YYYY-MM-DD HH:MM`',
                      '> 💡 Para registrar la fecha de solución: `/fecha_fin YYYY-MM-DD HH:MM`'
                    ].join('\n')
                  });
                }
              }
            }

            // ─── Generar Job Summary (Markdown) ─────────────────
            const summary = core.summary
              .addHeading('🔍 Auditoría de fechas en incidentes', 2)
              .addRaw(`📅 Ejecutada: ${new Date().toISOString().split('T')[0]}  \n`)
              .addRaw(`📊 **${okCount.total}** issues revisados | **${okCount.withProblems}** con problemas | **${okCount.total - okCount.withProblems}** correctos\n\n`);

            if (results.length === 0) {
              summary.addRaw('✅ Todos los issues tienen fechas con formato correcto.\n');
            } else {
              const rows = results.map(r => [
                { data: `<a href="${r.url}">#${r.issue}</a>` },
                { data: r.title },
                { data: `<code>${r.field}</code>` },
                { data: r.problem },
                { data: r.value === '-' ? '-' : `<code>${r.value}</code>` }
              ]);

              summary.addTable([
                [
                  { data: 'Issue', header: true },
                  { data: 'Título', header: true },
                  { data: 'Campo', header: true },
                  { data: 'Problema', header: true },
                  { data: 'Valor actual', header: true }
                ],
                ...rows
              ]);

              summary.addRaw('\n> 💡 Correcciones: `/fecha_inicio YYYY-MM-DD HH:MM` o `/fecha_fin YYYY-MM-DD HH:MM`\n');
            }

            await summary.write();

            // ─── Generar CSV ────────────────────────────────────
            const csvHeader = 'Issue,Titulo,URL,Campo,Problema,Valor';
            const csvRows = results.map(r =>
              `${r.issue},"${r.title}",${r.url},${r.field},"${r.problem}","${r.value.replace(/"/g, '""')}"`
            );
            const csvContent = [csvHeader, ...csvRows].join('\n') + '\n';
            core.setOutput('csv', csvContent);

            core.info(`Auditoría completada: ${okCount.withProblems} issue(s) con problemas de ${okCount.total} revisados.`);

      - name: Guardar reporte CSV
        run: |
          mkdir -p audit-report
          cat <<'CSVEOF' > audit-report/audit-dates.csv
          ${{ steps.audit.outputs.csv }}
          CSVEOF
          sed -i 's/^          //' audit-report/audit-dates.csv

      - name: Subir artefacto CSV
        uses: actions/upload-artifact@v4
        with:
          name: audit-dates-report-${{ github.run_id }}
          path: audit-report/audit-dates.csv
          retention-days: 30
